<!DOCTYPE html>
<html>
    <head>
        <title>61-dars. CSS grid</title>
        <meta name="viewport" content="width=devise-width, initial-scale=1.0">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.11.0/css/all.min.css" integrity="sha512-AyOHI/tIMgoG+32apAs3OdqFowPSDqiz5vLcD2wdhBJ4J/xF1PI6UITcyhS5HCmsiioapRaONqYBvimxzFfnoA==" crossorigin="anonymous" referrerpolicy="no-referrer" /> 
        <link rel="stylesheet" href="./CSS/shared.css">
        <link rel="stylesheet" href=".//css/main.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <style>
            body {
                font-family: sans-serif;
            }

            .grid-container {
                display: grid;
                grid-template-columns: auto auto auto; /*auto auto*/
                grid-template-rows: 50px 100px;
                padding: 20px;
                background-color: #025955;
                border-radius: 10px;
            }

            .grid-item {
                padding: 20px;
                background-color: #FDE8CD;
                font-weight: bold;
                margin: 10px;
                border-radius: 10px;
            }

            .item-1 {
                grid-column: 1 / 3; /*eniga cho'ziladi*/
                grid-row: 1 / 3; /*grid-row nechtadir qatorni o'z ichiga olishi uchun "grid-row: 1/ span 2;"=> 2t qatorni olsin degani */
            }
        </style>
    </head>
    <body>
        <div class="grid-container">
            <div class="grid-item item-1">Grid item 1</div>
            <div class="grid-item">Grid item 2</div>
            <div class="grid-item">Grid item 3</div>
            <div class="grid-item">Grid item 4</div>
            <div class="grid-item">Grid item 5</div>
            <div class="grid-item">Grid item 6</div>
        </div>
    </body>
</html>
