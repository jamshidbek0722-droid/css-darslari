<!DOCTYPE html>
<html>
    <head>
        <title>41-dars. Breakpoints</title>
        <meta name="viewport" content="width+devise-width, initial-scale=1.0">
        <link rel="stylesheet" href="./CSS/main.css">
        <meta name="viewport" content="width=devise-width, initial-scale=1">
        <style>
            h1 {
                font-size: 0.8rem;
            }
            /* Kichik deviselar (mobil telefonlar (landscape), 576px dan yuqorisi) */
            @media only screen and (min-width: 576px) {
                h1 {
                    font-size: 1rem;
                }
            } 

            /* O'rtacha deviselar (planshetlar, 768pxdan yuqori) */
            @media only screen and (min-width: 768px) {
                h1 {
                    font-size: 1.5rem;
                }
            }
            
            /* Katta deviselar (noutbuklar, 992px dan yuqorisi) */
            @media only screen and (min-width: 992px) {
                h1 {
                    font-size: 2rem;
                }
            }

            /* Kattaroq deviselar (Katta o'lchamga ega monitorlar, 1200px dan yuqorisi) */
            @media only screen and (min-width: 1200px) {
                h1 {
                    font-size: 3rem;
                }
            }
        </style>
    </head>
    <body>
        <h1>
            Ekran o'lcho'viga qarab o'z o'lchamini o'zgartiruvchi sarlavha
        </h1>
    </body>
</html>
