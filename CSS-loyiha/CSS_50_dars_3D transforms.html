<!DOCTYPE html>
<html>
    <head>
        <title>50-dars. 3D transforms</title>
        <meta name="viewport" content="width+devise-width, initial-scale=1.0">
        <link rel="stylesheet" href="./CSS/main.css">
        <meta name="viewport" content="width=devise-width, initial-scale=1">
        <style>
            .parent-box {
                width: 500px;
                height: 500px;
                border: 5px solid blue;
            } 
            .box-1 {
                width: 100%;
                height: 100%;
                transform: rotate3d(1, 2, -1, 30deg);
            }

            .box-2 {
                width: 500px;
                height: 500px;
                background-color: red;
                transform: perspective(100px) translate3d(10px, 20px, -300px);
            }

            .parent-box-2 {
                width: 500px;
                height: 500px;
                border: 5px solid blue;
            }

            .box-3 {
                width: 100%;
                height: 100%;
                background-color: red;
                transform-origin: left top;
                transform: scale3d(2, 3, 4);
            }
        </style>
    </head>
    <body>
        <!--<hr><div class="parent-box">
            <div class="box-1">X o'qi bo'yicha 10, Y o'qi bo'yicha 20, Z o'qi bo'yicha 30 darajaga aylanish</div>
        </div>-
        <hr><div class="box-2">X o'qi bo'yicha 10px, Y o'qi bo'yicha 20px, Z o'qi bo'yicha 30px darajaga siljitish</div>-->
        <div class="parent-box-2">
            <div class="box-3">X o'qi bo'yicha 2, Y o'qi bo'yicha 3 va Z o'qi bo'icha 4barobar</div>
        </div>
    </body>
</html>
