<!DOCTYPE html>
<html>
    <head>
        <title>52-dars. Animations 1-qism</title>
        <meta name="viewport" content="width+devise-width, initial-scale=1.0">
        <link rel="stylesheet" href="./CSS/main.css">
        <meta name="viewport" content="width=devise-width, initial-scale=1">
        <style>
            @keyframes box-1-mover {
                0% {
                    left: 0;
                    background-color: red;
                    width: 200%;
                    border-radius: 0px;
                }

                100% {
                    left: 500px;
                    background-color: green;
                    width: 400px;
                    border-radius: 10px;
                }
            }

            .box-1 {
                width: 200px;
                height: 200px;
                position: relative;
                background-color: red;
                color: rgb(255, 255, 255);
                animation-name: box-1-mover;
                animation-duration: 8s;
                animation-delay: 2s; /* animatsiyamiz qanday vaqtga kechikib boshlanishini belgilaydi */
                animation-iteration-count: 200; /*animatsiya nech marta takrorlanishini belgilaydi*/
            }
        </style>
    </head>
    <body>
        <div class="box-1">Animatsiyaga ega bo'lgan quti</div>
    </body>
</html>
